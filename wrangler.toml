name = "workbench-docs-mcp"
main = "dist/mcp/worker.mjs"
compatibility_date = "2026-04-01"

[vars]
MCP_PATH_PREFIX = "/workbench"

[[routes]]
pattern = "platform.incursa.com/workbench"
